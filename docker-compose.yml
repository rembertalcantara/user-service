services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: recommendations
      POSTGRES_USER: recommendation
      POSTGRES_PASSWORD: recommendation
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recommendation -d recommendations"]
      interval: 5s
      timeout: 5s
      retries: 10

  wiremock:
    image: wiremock/wiremock:3.5.2
    command: ["--global-response-templating", "--verbose"]
    ports: ["8089:8080"]
    volumes:
      - ./wiremock:/home/wiremock

  user-service:
    build:
      context: .
    environment:
      WIREMOCK_BASE_URL: http://wiremock:8080
    ports: ["8081:8081"]
    depends_on: [wiremock, postgres]



